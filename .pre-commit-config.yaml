repos:
  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt
        entry: cargo fmt --check
        language: system
        pass_filenames: false
        types_or:
          - rust
      - id: cargo-clippy
        name: cargo clippy
        entry: cargo clippy --all-targets --all-features
        language: system
        pass_filenames: false
        types_or:
          - rust
      - id: readiness-check
        name: readiness check
        entry: bash scripts/readiness-check.sh
        language: system
        pass_filenames: false
