name: Quality

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends cmake clang pkg-config

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Coverage threshold
        run: cargo llvm-cov --all-targets --all-features --fail-under-lines 1

      - name: Complexity threshold
        run: |
          python3 -m pip install lizard
          lizard -l rust -C 30 -L 250 src

      - name: Duplicate code threshold
        run: npx --yes jscpd@4 --pattern "**/*.rs" --ignore "target/**" --min-lines 8 --threshold 10 .

  unused-dependencies:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends cmake clang pkg-config

      - name: Set up nightly Rust
        uses: dtolnay/rust-toolchain@nightly

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-udeps
        run: cargo install cargo-udeps --locked

      - name: Detect unused dependencies
        run: cargo +nightly udeps --all-targets --all-features
